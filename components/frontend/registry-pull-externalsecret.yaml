# components/frontend/registry-pull-externalsecret.yaml
# private GitLab Container Registry 에서 이미지를 pull 하기 위한 자격(Vault→ESO).
# kubelet 이 registry.gitlab.com/sagopanda/sapari-fe 를 받으려면 imagePullSecret 필요.
# (CI push 는 $CI_JOB_TOKEN 자동 — 이건 "클러스터 pull" 용으로 별개)
#
# 사전 준비(1회): GitLab → sapari-fe → Settings → Repository → Deploy tokens
#   name 자유, scope = read_registry 체크 → 발급된 username + token 을 Vault 에 저장:
#   kubectl -n security exec -it vault-0 -- \
#     vault kv put secret/frontend/registry username="<deploy-token-user>" token="<deploy-token>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: frontend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-registry
    template:
      type: kubernetes.io/dockerconfigjson # imagePullSecret 타입
      data:
        .dockerconfigjson: '{"auths":{"registry.gitlab.com":{"username":"{{ .username }}","password":"{{ .token }}","auth":"{{ printf "%s:%s" .username .token | b64enc }}"}}}'
  data:
    - secretKey: username
      remoteRef: { key: frontend/registry, property: username }
    - secretKey: token
      remoteRef: { key: frontend/registry, property: token }
