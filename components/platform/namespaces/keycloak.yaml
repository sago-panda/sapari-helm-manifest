# components/platform/namespaces/keycloak.yaml
# keycloak ns — platform/namespaces leaf App(recurse)이 자동 적용.
# PSA: 처음엔 baseline enforce + restricted warn(검증 후 restricted 승격).
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
