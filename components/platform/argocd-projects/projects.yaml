# App-of-Apps 카테고리별 ArgoCD AppProject — UI PROJECTS 필터로 앱을 구분.
# 지금은 permissive(조직화 목적). destinations 를 좁히면 "이 프로젝트 앱은 이 ns 에만 배포" 가드레일이 됨.
# apps/platform/argocd-projects.yaml(project:default)이 이 매니페스트를 먼저 생성한다.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: platform, namespace: cicd } # AppProject 는 ArgoCD 가 설치된 ns(cicd)에
spec:
  description: "플랫폼 — ns·rbac·netpol·StorageClass·ClusterSecretStore·keycloak·projects"
  sourceRepos: ["*"] # 이 프로젝트 앱이 배포 소스로 쓸 수 있는 git/helm repo (좁히면 가드레일)
  destinations: [{ server: "*", namespace: "*" }] # 배포 허용 대상 클러스터/네임스페이스
  clusterResourceWhitelist: [{ group: "*", kind: "*" }] # 생성 허용 cluster-scoped 리소스 종류
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }] # 생성 허용 namespaced 리소스 종류
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: operators, namespace: cicd }
spec:
  description: "오퍼레이터 — longhorn·vault·eso·cnpg·strimzi·eck·minio-operator"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: secrets, namespace: cicd }
spec:
  description: "시크릿 — ExternalSecret(Vault→ESO)"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: data, namespace: cicd }
spec:
  description: "데이터 — postgresql·mongodb·redis·kafka·elasticsearch·minio"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: observability, namespace: cicd }
spec:
  description: "관측 — prometheus·loki·alloy·tempo·kibana"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: networking, namespace: cicd }
spec:
  description: "네트워킹 — Gateway·HTTPRoute"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata: { name: frontend, namespace: cicd }
spec:
  description: "프론트엔드 — sapari-fe (향후 backend 추가 시 분리)"
  sourceRepos: ["*"]
  destinations: [{ server: "*", namespace: "*" }]
  clusterResourceWhitelist: [{ group: "*", kind: "*" }]
  namespaceResourceWhitelist: [{ group: "*", kind: "*" }]
