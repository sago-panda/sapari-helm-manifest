# Keycloak (OIDC IdP) — apiserver OIDC 연동용. helm chart: bitnami/keycloak 25.2.0

global:
  security:
    allowInsecureImages: true # 차트의 "bitnami 공식 이미지만 허용" 가드 해제 (아래 bitnamilegacy 쓰려면 필요)
image:
  registry: docker.io
  # 2025-08 Bitnami 카탈로그 변경으로 버전태그가 bitnamilegacy 로 이동. pull 되면 bitnami/keycloak 로 환원
  repository: bitnamilegacy/keycloak
  pullPolicy: IfNotPresent

replicaCount: 1
# cache 는 기본값 유지. enabled:false 로 두면 cache-stack 충돌로 keycloak.conf 가 깨져 부팅 실패함

production: true # 운영 모드 — 개발용 기본설정·임시 self-signed 비활성. 실DB + hostname 필수
proxyHeaders: xforwarded # 앞단 프록시의 X-Forwarded-* 를 신뢰 → 원본 https/호스트 인식
tls:
  enabled: false # Keycloak 자체 TLS 끔 (TLS 는 Cloudflare/Gateway 에서 종단)
extraEnvVars:
  - name: KC_HOSTNAME # Keycloak 외부 URL = OIDC issuer(토큰 iss). apiserver 설정과 정확히 일치해야 함
    value: "https://auth.ascode.click"
  - name: KC_HTTP_ENABLED # tls 끈 상태에서 HTTP 리스너 허용
    value: "true"

# 관리자 자격: Vault → ESO 가 만든 Secret 에서 읽음 (git 평문 0)
auth:
  adminUser: admin
  existingSecret: keycloak-admin # 이 이름의 Secret 의
  passwordSecretKey: admin-password # 이 키에 admin 비번

service:
  type: ClusterIP # 외부 노출은 Envoy Gateway HTTPRoute 가 담당
  ports:
    http: 80 # svc:80 → 컨테이너 8080
ingress:
  enabled: false # 차트 ingress 대신 Gateway API HTTPRoute 사용

# DB: 번들 PostgreSQL (Keycloak 전용)
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql # keycloak 이미지와 동일한 카탈로그 이슈 대응
  architecture: standalone # 단일 인스턴스(복제 없음)
  auth:
    username: keycloak
    database: keycloak
    existingSecret: keycloak-postgresql # DB 비번도 Vault→ESO Secret 에서
    secretKeys:
      adminPasswordKey: postgres-password # postgres 슈퍼유저 비번 키
      userPasswordKey: password # keycloak 앱 유저 비번 키
  primary:
    persistence:
      enabled: true
      storageClass: longhorn-prod
      size: 8Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 512Mi }
  volumePermissions:
    enabled: false # 루트 권한 initContainer 끔 (PSA restricted 호환)

# 대안: 기존 CNPG 재사용 시 postgresql.enabled:false + 아래 사용
# externalDatabase:
#   host: postgres-cluster-rw.storage.svc.cluster.local
#   port: 5432
#   user: keycloak
#   database: keycloak
#   existingSecret: keycloak-db
#   existingSecretPasswordKey: password

resources:
  requests: { cpu: 250m, memory: 768Mi }
  limits:   { cpu: "1",  memory: 1Gi }

# non-root 강제 + 권한 최소화 (PSA restricted 충족)
podSecurityContext:
  enabled: true
  fsGroup: 1001 # 마운트 볼륨 그룹 소유권 → non-root 쓰기 가능
containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false # setuid 등 권한 상승 차단
  capabilities:
    drop: ["ALL"] # 리눅스 커널 권한 전부 제거
  seccompProfile:
    type: RuntimeDefault # 위험 syscall 차단

# 첫 부팅 DB 마이그레이션이 느려 startup 윈도우를 넉넉히 (period×failureThreshold = 최대 ~5분)
startupProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 30
livenessProbe:
  enabled: true
readinessProbe:
  enabled: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    labels:
      release: kube-prometheus-stack # Prometheus 가 이 라벨로 ServiceMonitor 를 선택 → 실제 release 명과 일치 필수

networkPolicy:
  enabled: false # 차트 netpol 끄고 components/platform/network-policies 에서 중앙 관리

keycloakConfigCli:
  enabled: false # realm/client 를 코드로 import 할 때 켜기
