# components/platform/network-policies/keycloak-smtp-fqdn.yaml
# Calico 도메인 기반 egress — keycloak 파드가 Resend SMTP(587)로만 나가게 한다.
# 표준 NetworkPolicy는 FQDN 미지원 → Calico CRD(projectcalico.org/v3) 사용.
# 동작: Felix 가 파드의 DNS 조회(→ CoreDNS, k8s netpol에서 53 허용됨)를 스눕해
#       allowedEgressDomains 의 도메인→IP 를 학습하고 그 IP로만 egress 를 연다.
# 합성: keycloak ns 의 k8s default-deny(egress) 와 함께 평가 → 이 Allow 만 통과,
#       나머지 외부 egress 는 계속 차단.
# 전제:
#   - Calico API server(projectcalico.org/v3) 가 설치돼 있어야 함.
#     (raw CRD만 있으면 apiVersion 을 crd.projectcalico.org/v1 로, 아래 필드 동일)
#   - Calico iptables 데이터플레인(기본). eBPF 모드면 DNS policy 지원 버전 확인.
#   - selector 라벨이 실제 keycloak 파드 라벨과 일치해야 함(bitnami 기본: app.kubernetes.io/name=keycloak).
---
apiVersion: projectcalico.org/v3
kind: NetworkSet
metadata:
  name: resend-smtp
  namespace: keycloak
  labels:
    egress-target: resend-smtp        # 정책에서 destination.selector 로 참조
spec:
  allowedEgressDomains:
    - smtp.resend.com
    - smtp.apps.resend.com            # CNAME 체인 대상도 포함(안전)
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: keycloak-smtp-egress
  namespace: keycloak
spec:
  order: 100                          # k8s NP(기본 order 1000)보다 먼저 평가
  selector: app.kubernetes.io/name == 'keycloak'   # keycloak 파드에만 적용(출발지 최소화)
  types: [Egress]
  egress:
    - action: Allow
      protocol: TCP
      destination:
        selector: egress-target == 'resend-smtp'    # 위 NetworkSet(도메인 IP)만
        ports: [587]                                # STARTTLS 제출 포트만
