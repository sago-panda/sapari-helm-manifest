# netpol/monitoring-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-netpol
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # monitoring лӮҙл¶Җ нҶөмӢ  (GrafanaвҶ’Prometheus, PrometheusвҶ’kube-state-metrics/alertmanager л“ұ)
    # м—Ҷмңјл©ҙ к°ҷмқҖ nsм—¬лҸ„ ingressк°Җ л§үнҳҖ нғҖмһ„м•„мӣғ (egressм—” podSelector{} мһҲм§Җл§Ң ingressм—” м—Ҷм—ҲмқҢ)
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
    # ECK operator вҶ’ Kibana нҢҢл“ң кҙҖлҰ¬/н—¬мҠӨмІҙнҒ¬
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: elastic-system
    # Gateway кІҪмң  мҷёл¶Җ м§„мһ… (Kibana 5601 HTTPRoute)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
    - to:
        - podSelector: {} # monitoring лӮҙл¶Җ нҶөмӢ 
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus мҠӨнҒ¬л Ҳмқҙн”„ вҖ” л…ёл“ңмқҳ kubelet/cadvisor(10250), node-exporter(9100).
    # host-networkлқј л…ёл“ң IPлЎң м ‘к·ј вҶ’ л…ёл“ң CIDR н—Ҳмҡ© н•„мҡ” (м—Ҷмңјл©ҙ л…ёл“ң нғҖкІҹ DOWN)
    # 6443: kube-apiserver (service VIPк°Җ л…ёл“ң:6443мңјлЎң DNATлҗЁ). operator/SD/certgenм—җ н•„мҲҳ.
    - to:
        - ipBlock:
            cidr: 192.168.123.0/24
      ports:
        - { port: 10250 }
        - { port: 9100 }
        - { port: 6443 }
    - ports:
        - port: 443 # мҷёл¶Җ м•ҢлҰј (Slack, PagerDuty л“ұ) + kube-apiserver SD
        - port: 80
