# netpol/monitoring-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-netpol
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # monitoring лӮҙл¶Җ нҶөмӢ  (GrafanaвҶ’Prometheus, PrometheusвҶ’kube-state-metrics/alertmanager л“ұ)
    # м—Ҷмңјл©ҙ к°ҷмқҖ nsм—¬лҸ„ ingressк°Җ л§үнҳҖ нғҖмһ„м•„мӣғ (egressм—” podSelector{} мһҲм§Җл§Ң ingressм—” м—Ҷм—ҲмқҢ)
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
    # ECK operator вҶ’ Kibana нҢҢл“ң кҙҖлҰ¬/н—¬мҠӨмІҙнҒ¬
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: elastic-system
    # Gateway кІҪмң  мҷёл¶Җ м§„мһ… (Kibana 5601 HTTPRoute)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: storage
    - to:
        - podSelector: {} # monitoring лӮҙл¶Җ нҶөмӢ 
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus вҶ’ Envoy Gateway proxy л©”нҠёлҰӯ (PodMonitor, 19001 /stats/prometheus)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - { port: 19001 }
    - ports:
        - port: 443 # мҷёл¶Җ м•ҢлҰј (Slack, PagerDuty л“ұ)
        - port: 80
---
# л…ёл“ң мҠӨнҒ¬л Ҳмқҙн”„(kubelet/cAdvisor 10250, node-exporter 9100) + kube-apiserver(SD/operator)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-netpol
  namespace: monitoring
spec:
  endpointSelector: {}
  ingress:
    # Cilium Gateway м§„мһ…(мҳҲм•ҪмӢ мӣҗ ingress) вҖ” phase 4 м—җм„ң envoy-gateway-system ns к·ңм№ҷ лҢҖмІҙ
    - fromEntities: [ingress]
  egress:
    - toEntities: [host, remote-node]
      toPorts:
        - ports:
            - { port: "10250", protocol: TCP }
            - { port: "9100", protocol: TCP }
    - toEntities: [kube-apiserver]
