# netpol/storage-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: storage-netpol
  namespace: storage
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cicd
    - from:
        - podSelector: {} # storage 내부 replication 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
    # CNPG operator → 인스턴스 status(8000)/metrics 프로브. 없으면 클러스터가
    # NotReady 로 묶여 두 번째 인스턴스가 생성되지 않음
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
    # ECK operator → Elasticsearch 파드(9200) 오케스트레이션/헬스체크
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: elastic-system
  egress:
    - to:
        - podSelector: {} # storage 내부 통신
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# kube-apiserver egress (minio/strimzi 등 operator 의 API 호출)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-netpol
  namespace: storage
spec:
  endpointSelector: {}
  ingress:
    # Gateway 진입 — Cilium Gateway 트래픽은 예약신원 ingress (ns 셀렉터 미매칭)
    - fromEntities: [ingress]
  egress:
    - toEntities: [kube-apiserver]
