# netpol/security-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: security-netpol
  namespace: security
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
    - from:
        - namespaceSelector: {} # 모든 ns에서 Vault 접근 허용 (앱 시크릿 읽기)
      ports:
        - port: 8200
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# apiserver 연동 — vault-agent-injector webhook 수신(8080) + Vault k8s auth(TokenReview) egress
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-netpol
  namespace: security
spec:
  endpointSelector: {}
  ingress:
    - fromEntities: [kube-apiserver, host, remote-node]
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
  egress:
    - toEntities: [kube-apiserver]
