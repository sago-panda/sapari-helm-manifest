# netpol/external-secrets-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-netpol
  namespace: external-secrets

spec:
  podSelector: {}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector: {}
    # kube-apiserver → webhook 호출
    # source IP가 master tunl0 IP 또는 node IP 등으로 변동 가능해서 ipBlock 매칭이 까다로움
    # webhook은 TLS + admission review 페이로드 검증이 있으니 포트만 열어둠
    - ports:
        - port: 10250
          protocol: TCP
        - port: 9443
          protocol: TCP
        - port: 443
          protocol: TCP

  egress:
    - to:
        - podSelector: {}

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    - to:
        - ipBlock:
            cidr: 10.96.0.0/12
      ports:
        - port: 443
          protocol: TCP

    - to:
        - ipBlock:
            cidr: 192.168.123.0/24
      ports:
        - port: 6443
          protocol: TCP

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
      ports:
        - port: 8200
          protocol: TCP
