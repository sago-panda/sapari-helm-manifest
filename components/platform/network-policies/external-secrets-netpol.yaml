# netpol/external-secrets-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-netpol
  namespace: external-secrets

spec:
  podSelector: {}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector: {}

  egress:
    - to:
        - podSelector: {}

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: security
      ports:
        - port: 8200
          protocol: TCP
---
# apiserver 연동 — webhook 수신(ingress) + API 호출(egress). 예약신원이라 entity 로 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-netpol
  namespace: external-secrets
spec:
  endpointSelector: {}
  ingress:
    - fromEntities: [kube-apiserver, host, remote-node]
      toPorts:
        - ports:
            - { port: "10250", protocol: TCP } # ESO webhook
            - { port: "9443", protocol: TCP }
            - { port: "443", protocol: TCP }
  egress:
    - toEntities: [kube-apiserver]
