# Cilium 은 노드/API서버 트래픽에 예약 신원(kube-apiserver·host·remote-node)을 부여하고,
# 예약 신원에는 ipBlock(CIDR) 규칙이 매칭되지 않는다 — 기존 netpol 의
# `ipBlock: 192.168.123.0/24` 허용이 무효가 되므로 toEntities 로 보충한다.
---
# default-deny 네임스페이스의 API 서버 egress (operator/controller 필수)
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-egress-kube-apiserver-compat
spec:
  endpointSelector:
    matchExpressions:
      - key: io.kubernetes.pod.namespace
        operator: In
        values: [cicd, external-secrets, monitoring, security, storage]
  egress:
    - toEntities:
        - kube-apiserver
---
# Prometheus 노드 스크레이프 — kubelet/cAdvisor(10250), node-exporter(9100)
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-monitoring-node-scrape-compat
spec:
  endpointSelector:
    matchExpressions:
      - key: io.kubernetes.pod.namespace
        operator: In
        values: [monitoring]
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - { port: "10250", protocol: TCP }
            - { port: "9100", protocol: TCP }
