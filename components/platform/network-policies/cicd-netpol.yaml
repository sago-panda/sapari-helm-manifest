# netpol/cicd-netpol.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cicd-netpol
  namespace: cicd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # cicd 내부 통신 (argocd server↔repo-server↔redis↔controller↔applicationset)
    # 없으면 같은 ns여도 ingress 막혀 컴포넌트가 서로 못 붙음
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {} # cicd 내부 통신
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443 # GitHub, GitLab 등 외부 git repo
        - port: 22 # SSH git
---
# kube-apiserver egress (ArgoCD 동기화) — Cilium 예약신원은 ipBlock 미매칭이라 entity 로 허용
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cilium-netpol
  namespace: cicd
spec:
  endpointSelector: {}
  ingress:
    # Gateway 진입 — Cilium Gateway 트래픽은 예약신원 ingress (ns 셀렉터 미매칭)
    - fromEntities: [ingress]
  egress:
    - toEntities: [kube-apiserver]
