# rbac/argocd-clusterrole.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-role
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-rolebinding
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: cicd
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: argocd-role
