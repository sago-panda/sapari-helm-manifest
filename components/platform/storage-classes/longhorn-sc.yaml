# storage/longhorn-sc.yaml
# 홈랩/dev: Delete (PVC 삭제 시 PV·볼륨 자동 정리, 잔재 quota 누적 방지)
# 운영 데이터 필요 시: Retain 으로 바꾸고 별도 백업 정책 운영
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-prod
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
  fsType: ext4
  dataLocality: best-effort
