# ingress/argocd-httproute.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: cicd
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: default
  hostnames: [argocd.ascode.click]
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
