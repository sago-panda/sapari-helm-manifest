# ingress/minio-httproute.yaml
# MinIO Console + S3 API 외부 노출 (Cloudflare Tunnel → Envoy Gateway → svc)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: storage
spec:
  parentRefs:
    - name: admin-gateway
      namespace: ingress
  hostnames:
    - minio.ascode.click
  rules:
    - backendRefs:
        - name: myminio-console
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: storage
spec:
  parentRefs:
    - name: public-gateway # 이미지 업/다운 경로라 공개(콘솔 minio.ascode.click 은 admin 유지)
      namespace: ingress
  hostnames:
    - storage.ascode.click
  rules:
    - backendRefs:
        - name: minio
          port: 80
