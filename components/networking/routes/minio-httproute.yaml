# ingress/minio-httproute.yaml
# MinIO Console + S3 API 외부 노출 (Cloudflare Tunnel → Envoy Gateway → svc)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: storage
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: default
  hostnames:
    - minio.ascode.click
  rules:
    - backendRefs:
        - name: myminio-console
          port: 9090
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: storage
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: default
  hostnames:
    - storage.ascode.click
  rules:
    - backendRefs:
        - name: minio
          port: 80
