# components/networking/routes/keycloak-httproute.yaml
# auth.ascode.click → keycloak svc. networking/httproutes leaf App(recurse)이 자동 적용.
# ★ public-gateway 사용(Cloudflare Access 미적용) — IdP 엔드포인트는 apiserver(JWKS)+브라우저 둘 다 닿아야 함.
# 전제(자동 아님): gateway.yaml public listener selector 에 keycloak 추가됨 + Cloudflare Tunnel: auth.ascode.click → .201(Access 없음)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: public-gateway
      namespace: default
  hostnames:
    - auth.ascode.click
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: keycloak
          port: 80
