# auth.ascode.click → keycloak.
# ★ public-gateway 사용(Cloudflare Access 미적용): IdP 엔드포인트(JWKS)는 apiserver·브라우저 둘 다 닿아야 함.
# 전제: gateway.yaml public selector 에 keycloak 포함 + Cloudflare Tunnel auth.ascode.click → .201
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: public-gateway
      namespace: ingress
  hostnames:
    - auth.ascode.click
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: keycloak
          port: 80
