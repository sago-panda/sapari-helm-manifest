# components/networking/gateway/podmonitor.yaml
# Envoy Gateway proxy 의 Prometheus 메트릭 스크레이프 (포트 metrics=19001, /stats/prometheus).
# EG 가 메트릭을 기본 노출하므로 PodMonitor 만 있으면 됨(EnvoyProxy/GatewayClass 수정 불필요).
# 게이트웨이가 모든 요청을 통과시키므로 요청수·상태코드(2xx/4xx/5xx)·지연(RED)이 여기서 보임
#   → frontend 라우트/백엔드도 cluster 라벨로 필터해 관측 가능.
# 전제: Prometheus 가 PodMonitor 를 줍도록 values 에 podMonitorSelector 설정 +
#       monitoring egress 가 envoy-gateway-system:19001 허용.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-gateway-proxy
  namespace: envoy-gateway-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy
      app.kubernetes.io/component: proxy
  namespaceSelector:
    any: true
  jobLabel: proxy-stats
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 15s
