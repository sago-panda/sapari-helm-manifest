# components/networking/gateway/gateway.yaml
# Envoy Gateway 의 GatewayClass + Gateway (MetalLB LB IP 192.168.123.200).
# 전제: envoy-gateway 컨트롤러와 MetalLB 는 클러스터에 이미 설치되어 있어야 한다
#       (envoy-gateway-system / metallb-system 은 GitOps 범위 밖, 부트스트랩 단계).
# TLS 는 Cloudflare/Gateway 종단 → 내부는 http(80).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: default
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values: [storage, monitoring, security, cicd, ingress]
