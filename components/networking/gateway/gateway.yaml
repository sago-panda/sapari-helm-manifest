# components/networking/gateway/gateway.yaml
# 공개(public) / 내부관리(admin) 2-게이트웨이 분리. Cilium Gateway API (GatewayClass cilium).
#   - public-gateway  : sapari.ascode.click (frontend + 향후 backend /api)  → 192.168.123.201
#   - admin-gateway   : argocd/grafana/kibana/vault/minio (Cloudflare Access) → 192.168.123.202
# IP 고정: spec.infrastructure.annotations 가 cilium-gateway-* LB Service 에 전파 → Cilium LB-IPAM 할당.
# 전제: cilium gatewayAPI.enabled + lb-ipam(components/networking/lb-ipam).
# ※ Cloudflare Tunnel(105 호스트)에서 각 호스트를 해당 게이트웨이 IP 로 라우팅해야 함(외부 작업).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: ingress
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: "192.168.123.201"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              # storage = minio-s3(storage.ascode.click, 이미지 업/다운 공개), 향후 backend 추가
              # keycloak = auth.ascode.click (OIDC IdP, Cloudflare Access 미적용 — apiserver JWTS·브라우저 둘 다 접근)
              - { key: kubernetes.io/metadata.name, operator: In, values: [frontend, storage, keycloak] }
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: admin-gateway
  namespace: ingress
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: "192.168.123.202"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - { key: kubernetes.io/metadata.name, operator: In, values: [cicd, monitoring, security, storage] }
