# components/networking/lb-ipam/lb-ipam.yaml
# Cilium LB-IPAM 풀 + L2 광고 — LoadBalancer VIP (192.168.123.200~210)
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-pool
spec:
  blocks:
    - start: "192.168.123.200"
      stop: "192.168.123.210"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: homelab-l2
spec:
  loadBalancerIPs: true
  interfaces: ["^wlp.*"] # 노드 NIC = wlp1s0 (WiFi) — ^eth/^en 은 매칭 0 으로 전면 단절
  nodeSelector:
    matchLabels: {} # 전 노드 (svc eTP=Cluster 라 어느 노드든 광고/포워딩 가능)
