# monitoring/tempo-minio-externalsecret.yaml
# Tempo가 트레이스 블록을 MinIO(tempo-traces 버킷)에 저장하기 위한 자격증명 (Vault→ESO).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-minio
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: tempo-minio
  data:
    # Tempo S3 클라이언트가 자동 인식하는 AWS 표준 env 이름 → expand-env 불필요
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: storage/minio, property: access_key }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: storage/minio, property: password }
