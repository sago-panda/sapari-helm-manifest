# monitoring/grafana-admin-externalsecret.yaml
# Grafana admin 비번을 Vault(secret/monitoring/grafana)에서 가져와 grafana-admin secret 생성.
# prometheus-values.yaml 의 grafana.admin.existingSecret 가 이걸 참조.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    template:
      data:
        admin-user: admin
        admin-password: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: monitoring/grafana
        property: admin_password
