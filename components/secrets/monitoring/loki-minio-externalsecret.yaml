# monitoring/loki-minio-externalsecret.yaml
# Loki가 MinIO(S3)에 청크를 저장하기 위한 자격증명. Vault(secret/storage/minio)에서 가져옴.
# loki-values.yaml 의 singleBinary.extraEnvFrom 가 이 secret을 env로 로드 → config의 ${VAR} 치환.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-minio
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: loki-minio
  data:
    - secretKey: MINIO_ACCESS_KEY
      remoteRef: { key: storage/minio, property: access_key }
    - secretKey: MINIO_SECRET_KEY
      remoteRef: { key: storage/minio, property: password }
