# components/secrets/keycloak/externalsecret.yaml
# Vault → ESO: keycloak-admin / keycloak-postgresql. apps/secrets/keycloak-secrets.yaml leaf 가 적용.
# 사전(완료): vault kv put secret/keycloak admin-password=... postgres-password=... password=...
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-admin            # values.auth.existingSecret
    creationPolicy: Owner
  data:
    - secretKey: admin-password     # values.auth.passwordSecretKey
      remoteRef: { key: keycloak, property: admin-password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-postgresql
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-postgresql       # values.postgresql.auth.existingSecret
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: keycloak, property: postgres-password }
    - secretKey: password
      remoteRef: { key: keycloak, property: password }
