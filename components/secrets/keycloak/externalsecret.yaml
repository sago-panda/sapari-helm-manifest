# Keycloak admin/DB 자격 — Vault(secret/keycloak) → ESO 가 k8s Secret 으로 동기화.
# 사전: vault kv put secret/keycloak admin-password=.. postgres-password=.. password=..
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  namespace: keycloak
spec:
  refreshInterval: 1h # Vault 값을 1시간마다 재동기화
  secretStoreRef:
    name: vault-backend # 어느 Vault(ClusterSecretStore)에서 읽을지
    kind: ClusterSecretStore
  target:
    name: keycloak-admin # 생성할 k8s Secret 이름 (values.auth.existingSecret 와 일치)
    creationPolicy: Owner
  data:
    - secretKey: admin-password # k8s Secret 의 키
      remoteRef: { key: keycloak, property: admin-password } # Vault 의 secret/keycloak 의 admin-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-postgresql
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-postgresql # values.postgresql.auth.existingSecret 와 일치
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: keycloak, property: postgres-password }
    - secretKey: password
      remoteRef: { key: keycloak, property: password }
