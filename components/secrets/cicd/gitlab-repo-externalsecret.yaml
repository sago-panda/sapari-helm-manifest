# components/secrets/cicd/gitlab-repo-externalsecret.yaml
# ArgoCD가 private GitLab repo에 접근할 자격증명 (Vault→ESO).
# label argocd.argoproj.io/secret-type: repository 가 있어야 ArgoCD가 repo 자격으로 인식.
# Vault(secret/cicd/gitlab)에 username + token(Deploy Token 또는 PAT) 저장 필요.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-repo
  namespace: cicd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-repo
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://gitlab.com/sagopanda/sapari-helm-manifest.git
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef: { key: cicd/gitlab, property: username }
    - secretKey: token
      remoteRef: { key: cicd/gitlab, property: token }
