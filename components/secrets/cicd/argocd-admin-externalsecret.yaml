# cicd/argocd-admin-externalsecret.yaml
# ArgoCD admin 비번을 Vault로 관리. argocd-secret 의 admin.password(bcrypt)+admin.passwordMtime 만 주입.
# ★ creationPolicy: Merge → argocd-secret의 다른 키(server.secretkey 등)는 보존하고 admin.* 만 갱신.
# ★ 순서: argocd 설치(→ argocd-secret 생성) 후 이 ExternalSecret 적용.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin
  namespace: cicd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        key: cicd/argocd
        property: admin_bcrypt
    - secretKey: admin.passwordMtime
      remoteRef:
        key: cicd/argocd
        property: admin_mtime
