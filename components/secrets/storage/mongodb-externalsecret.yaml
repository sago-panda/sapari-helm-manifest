# storage/mongodb-externalsecret.yaml
# Vault KV (secret/storage/mongodb) → K8s Secret(mongodb-root)
# bitnami mongodb chart 의 existingSecret 은 두 키 모두 필요:
#   - mongodb-root-password
#   - mongodb-replica-set-key
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: mongodb-root
    namespace: storage
spec:
    refreshInterval: 1h
    secretStoreRef:
        name: vault-backend
        kind: ClusterSecretStore
    target:
        name: mongodb-root
        template:
            data:
                mongodb-root-password: "{{ .root_password }}"
                mongodb-replica-set-key: "{{ .replica_set_key }}"
    data:
        - secretKey: root_password
          remoteRef:
              key: storage/mongodb
              property: root_password
        - secretKey: replica_set_key
          remoteRef:
              key: storage/mongodb
              property: replica_set_key
