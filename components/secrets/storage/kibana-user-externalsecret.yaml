# storage/kibana-user-externalsecret.yaml
# Kibana 로그인용 전용 read-only ES 유저(kibana-viewer).
# Vault(secret/storage/kibana-user)의 bcrypt 해시 → ESO가 ECK fileRealm 형식 secret 생성.
# 권한: ES 빌트인 'viewer' role = 모든 인덱스 read + Kibana read-only (superuser 'elastic' 대체).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: es-kibana-users
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: es-kibana-users
    template:
      data:
        # ECK fileRealm 형식: htpasswd 스타일 + role 매핑
        users: "kibana-viewer:{{ .bcrypt }}"
        users_roles: "viewer:kibana-viewer"
  data:
    - secretKey: bcrypt
      remoteRef:
        key: storage/kibana-user
        property: bcrypt
