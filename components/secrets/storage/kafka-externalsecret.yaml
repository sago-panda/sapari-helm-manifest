# storage/kafka-externalsecret.yaml
# Strimzi KafkaUser 'app' 이 참조할 SCRAM 비번 secret.
# 기존 Vault 경로(secret/storage/kafka)의 client_password 를 재사용.
# (inter_broker / controller 비번은 Strimzi가 내부 mTLS로 처리하므로 더 이상 불필요)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kafka-app-password
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kafka-app-password
    template:
      data:
        password: "{{ .client_password }}"
  data:
    - secretKey: client_password
      remoteRef:
        key: storage/kafka
        property: client_password
