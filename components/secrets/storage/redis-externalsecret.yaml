# storage/redis-externalsecret.yaml
# Vault KV (secret/storage/redis) → K8s Secret(redis-password)
# bitnami redis chart 의 auth.existingSecret 참조용
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-password
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-password
    template:
      data:
        redis-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: storage/redis
        property: password
