# storage/minio-credentials-externalsecret.yaml
# Vault KV (secret/storage/minio) 의 access_key / password 를
# MinIO operator 가 기대하는 config.env 포맷으로 변환해
# K8s Secret(myminio-env-configuration) 생성
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: myminio-env-configuration
  namespace: storage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: myminio-env-configuration
    creationPolicy: Owner
    template:
      data:
        config.env: |
          export MINIO_ROOT_USER="{{ .access_key }}"
          export MINIO_ROOT_PASSWORD="{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: storage/minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: storage/minio
        property: password
