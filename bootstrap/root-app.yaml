# bootstrap/root-app.yaml
# App of Apps 루트 (1-tier 평탄화) — apps/<category>/*.yaml 의 leaf App 을 '직접' 배포.
# 카테고리 부모 App(apps/*.yaml)을 없앴고, 콘솔 그룹화는 AppProject(PROJECTS 필터)가 담당.
# 배포 순서는 ArgoCD 수렴(selfHeal 재시도)에 의존(레포 철학) — 필요 시 leaf 에 sync-wave 추가.
# 최초 1회만 kubectl apply, 이후엔 git push로 자동 반영.
#   kubectl apply -f bootstrap/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: cicd # ArgoCD 가 cicd 네임스페이스에 설치되어 있음
spec:
  project: default
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: release
    path: apps
    directory:
      recurse: true # apps/<category>/*.yaml leaf 를 직접 배포(평탄화). 그룹은 AppProject.
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated:
      prune: true # git에서 지운 App은 클러스터에서도 제거
      selfHeal: true # 수동 변경(drift) 자동 복구
    syncOptions:
      - CreateNamespace=true
