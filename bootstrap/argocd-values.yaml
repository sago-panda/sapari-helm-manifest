# cicd/argocd-values.yaml  (chart: argo/argo-cd)
# 홈랩용 — app-tier 노드 배치, TLS는 Gateway/Cloudflare에서 종단(서버는 insecure),
# dex 비활성(SSO 대신 admin), RBAC admin/readonly.
global:
  nodeSelector:
    role: application # kube-master (app-tier)

# argo-cd 서버 — Gateway 뒤에서 http (TLS 종단은 게이트웨이/CF)
server:
  service:
    type: ClusterIP
  extraArgs:
    - --insecure
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

controller:
  # 라이브 리소스 캐시+diff 담당 = 리소스 개수에 비례해 메모리 증가. 1Gi에서 OOMKilled(exit137, 사용량 914Mi/CPU 884m).
  # 단일 클러스터라 샤딩(replica)으로는 분담 불가 → 수직 확장(메모리·CPU)만 유효.
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: 2, memory: 2Gi }

repoServer:
  # 대형 Helm 차트(kube-prometheus-stack 등) 렌더 시 512Mi로는 OOMKilled(exit137) → 메모리 상향.
  # 증상: repo-server CrashLoopBackOff → application-controller가 :8081 i/o timeout → sync=Unknown.
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 2Gi }

applicationSet:
  resources:
    requests: { cpu: 100m, memory: 128Mi }

# argo-cd 내장 redis (storage의 redis와 별개 — argocd 캐시 전용)
redis:
  resources:
    requests: { cpu: 100m, memory: 128Mi }

dex:
  enabled: false # SSO 안 쓰면 끔 (자원 절약)

configs:
  params:
    server.insecure: true # Gateway 뒤 http
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      g, admin, role:admin
