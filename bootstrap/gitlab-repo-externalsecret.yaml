# bootstrap/gitlab-repo-externalsecret.yaml
# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD 가 private GitLab repo 를 clone 하기 위한 repository 자격증명.
# 이건 "ArgoCD 가 GitOps 트리를 읽기 위한 전제조건"이라 GitOps 트리(apps/)가 아니라
# bootstrap/ 에 둔다 — root-app 적용 *이전에* 수동으로 1회 apply 한다.
#
# 동작: 이미 떠 있는 ESO + ClusterSecretStore(vault-backend) 가 Vault(secret/cicd/gitlab)
#       의 username + token 을 읽어 → 라벨 붙은 K8s Secret(gitlab-repo) 생성
#       → ArgoCD 가 argocd.argoproj.io/secret-type=repository 라벨로 repo 자격으로 인식.
#
# 사전 준비(1회): Vault 에 GitLab Deploy Token(scope read_repository) 저장
#   kubectl -n security exec -it vault-0 -- \
#     vault kv put secret/cicd/gitlab username="<deploy-token-user>" token="<deploy-token>"
#
# 적용:
#   kubectl apply -f bootstrap/gitlab-repo-externalsecret.yaml
#   kubectl -n cicd wait --for=condition=Ready externalsecret/gitlab-repo --timeout=60s
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-repo
  namespace: cicd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-repo
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://gitlab.com/sagopanda/sapari-helm-manifest.git
        username: "{{ .username }}"
        password: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef: { key: cicd/gitlab, property: username }
    - secretKey: token
      remoteRef: { key: cicd/gitlab, property: token }
