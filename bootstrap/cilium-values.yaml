# bootstrap/cilium-values.yaml — Cilium CNI (bootstrap 레이어: helm 직접 설치)
#   CNI 는 ArgoCD 로 관리하지 않는다(네트워크 죽으면 ArgoCD 도 죽는 닭-달걀) —
#   argocd-values.yaml 과 같은 bootstrap 계층. Cilium "정책" CRD 들만 GitOps 로 관리.
#
#   적용:
#     helm repo add cilium https://helm.cilium.io
#     helm upgrade --install cilium cilium/cilium --version 1.19.4 \
#       -n kube-system -f bootstrap/cilium-values.yaml

# ── 데이터패스: native routing (같은 /24 L2, 오버레이 없음) ──
ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]
    clusterPoolIPv4MaskSize: 24
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.244.0.0/16"
enableIPv4Masquerade: true

# ── CNI: Cilium 단독 ──
cni:
  customConf: false
  uninstall: false        # agent 재시작/업그레이드 때 CNI conf 보존
  exclusive: true
operator:
  replicas: 1             # 2노드 홈랩
  unmanagedPodWatcher:
    restart: true
  resources:
    requests: {cpu: 20m, memory: 64Mi}
    limits: {memory: 256Mi}

# ── kube-proxy replacement — kube-proxy 가 없으므로 apiserver 직접 지정 필수 ──
kubeProxyReplacement: true
k8sServiceHost: 192.168.123.105
k8sServicePort: 6443

# ── LB-IPAM + L2 announcement — 풀/정책은 components/networking/lb-ipam (GitOps) ──
l2announcements:
  enabled: true
externalIPs:
  enabled: true

# ── Gateway API — 사전 설치된 Gateway API CRD bundle 이 Cilium 지원 버전과 일치해야 함 ──
gatewayAPI:
  enabled: true

# ── 관측 (Hubble — netpol drop 디버깅에 바로 사용) ──
hubble:
  enabled: true
  relay:
    enabled: true
    resources:
      requests: {cpu: 10m, memory: 64Mi}
      limits: {memory: 128Mi}
  ui:
    enabled: true         # hubble.ascode.click (admin-gateway HTTPRoute)
    frontend:
      resources:
        requests: {cpu: 10m, memory: 32Mi}
        limits: {memory: 64Mi}
    backend:
      resources:
        requests: {cpu: 10m, memory: 32Mi}
        limits: {memory: 64Mi}

# cilium-agent (노드당 1)
resources:
  requests: {cpu: 50m, memory: 256Mi}
  limits: {memory: 768Mi}

# FQDN(toFQDNs) 정책은 별도 스위치 불필요 — CiliumNetworkPolicy 에서 쓰면 DNS 프록시 자동.
