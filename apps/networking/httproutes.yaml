# apps/networking/httproutes.yaml — [매니페스트형 leaf] git 디렉토리 적용
# HTTPRoute 모음 (argocd/grafana/kibana/minio/vault, ns는 매니페스트에)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httproutes
  namespace: cicd
  labels: { category: networking }
spec:
  project: networking
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/networking/routes
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
