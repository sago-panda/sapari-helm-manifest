# apps/networking/gateway.yaml — [매니페스트형 leaf] git 디렉토리 적용
# GatewayClass(eg) + Gateway(homelab-gateway). envoy-gateway/MetalLB 전제
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: cicd
  labels: { category: networking }
spec:
  project: default
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/networking/gateway
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
