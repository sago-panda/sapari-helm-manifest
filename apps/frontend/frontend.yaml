# frontend SPA 배포 — components/frontend/ 의 Deployment·Service·HTTPRoute·NetworkPolicy 적용.
# 이미지 태그는 sapari-fe CI(bump)가 deployment.yaml 의 web 컨테이너 image 를
# @sha256:<digest> 로 갱신 → ArgoCD 가 자동 배포.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-web
  namespace: cicd
  labels: { category: frontend }
spec:
  project: frontend
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: release
    path: components/frontend
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: frontend # 매니페스트에 ns(frontend) 명시됨
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
