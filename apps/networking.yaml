# apps/networking.yaml — 카테고리 "부모" App (ArgoCD 콘솔의 그룹 노드)
# Gateway + HTTPRoute (백엔드 서비스가 뜬 뒤 노출)
# root-app 이 이 파일을 읽고, 이 App 이 apps/networking/ 의 leaf App 들을 배포한다.
# sync-wave: 카테고리(부모) 단위로만 순서를 강제 — leaf 에는 매직넘버를 넣지 않는다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking
  namespace: cicd
  labels:
    category: networking
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: networking
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: apps/networking # 이 폴더의 leaf App 들
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
