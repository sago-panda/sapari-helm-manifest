# ECK Kibana (elasticsearchRefвҶ’storage/elasticsearch)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: cicd
  labels: { category: observability }
spec:
  project: observability
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: release
    path: components/observability/kibana
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring # л§ӨлӢҲнҺҳмҠӨнҠём—җ ns к°Җ мһҲмңјл©ҙ к·ёмӘҪмңјлЎң
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
