# apps/data/elasticsearch.yaml — [매니페스트형 leaf] git 디렉토리 적용
# ECK Elasticsearch (상품 검색용, 단일 노드)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: cicd
  labels: { category: data }
spec:
  project: data
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: release
    path: components/data/elasticsearch
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: storage # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
