# apps/data/kafka.yaml — [매니페스트형 leaf] git 디렉토리 적용
# Strimzi Kafka(KRaft) + KafkaNodePool + KafkaUser
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: cicd
  labels: { category: data }
spec:
  project: data
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/data/kafka
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: storage # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
