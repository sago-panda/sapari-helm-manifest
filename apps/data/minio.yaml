# apps/data/minio.yaml — [Helm형 leaf] 차트=helm repo, values=git(멀티소스)
# MinIO Tenant (오브젝트 스토리지). configSecret=myminio-env-configuration(ESO)
# values 한 줄만 고쳐 push 해도 ref:values 소스가 새 커밋으로 추적 → 자동 재렌더·sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: cicd
  labels: { category: data }
spec:
  project: data
  sources:
    - repoURL: https://operator.min.io
      chart: tenant
      targetRevision: 7.1.1
      helm:
        releaseName: myminio # 수동 설치 release 이름과 일치 → 기존 Tenant 리소스 adopt
        valueFiles:
          - $values/components/data/minio/values.yaml
    - repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
