# apps/secrets/keycloak-secrets.yaml — [매니페스트형 leaf] git 디렉토리 적용
# Keycloak admin/DB 자격 (ExternalSecret). secrets 부모 App(recurse)이 이 leaf 를 자동 배포.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-secrets
  namespace: cicd
  labels: { category: secrets }
spec:
  project: secrets
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/secrets/keycloak
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
