# Keycloak admin/DB 자격(ExternalSecret) 배포 — root-app(recurse)이 직접 적용.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-secrets
  namespace: cicd
  labels: { category: secrets }
spec:
  project: secrets
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/secrets/keycloak # 이 폴더의 매니페스트를 그대로 적용
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
