# apps/secrets/cicd-secrets.yaml — [매니페스트형 leaf] git 디렉토리 적용
# ArgoCD admin / GitLab repo 자격 (ExternalSecret)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-secrets
  namespace: cicd
  labels: { category: secrets }
spec:
  project: default
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/secrets/cicd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
