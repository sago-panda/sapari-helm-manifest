# apps/secrets/cluster-secret-store.yaml — [매니페스트형 leaf] git 디렉토리 적용
# ClusterSecretStore(vault-backend). ESO CRD+Vault 이후 수렴
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secret-store
  namespace: cicd
  labels: { category: secrets }
spec:
  project: default
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/secrets/cluster-secret-store
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
