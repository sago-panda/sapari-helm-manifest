# apps/secrets/storage-secrets.yaml — [매니페스트형 leaf] git 디렉토리 적용
# Kafka/Kibana/MinIO/MongoDB/Redis 자격 (ExternalSecret)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-secrets
  namespace: cicd
  labels: { category: secrets }
spec:
  project: secrets
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/secrets/storage
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: storage # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
