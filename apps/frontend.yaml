# apps/frontend.yaml — 카테고리 "부모" App (ArgoCD 콘솔의 그룹 노드)
# 정적 SPA(sapari-fe). root-app 이 이 파일을 읽고, 이 App 이 apps/frontend/ 의 leaf 를 배포한다.
# sync-wave 5 — 인프라(0~4) 다음. (백엔드 생기면 backend 도 비슷한 wave)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: cicd
  labels:
    category: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: apps/frontend # 이 폴더의 leaf App 들
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cicd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
