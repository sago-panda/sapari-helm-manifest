# apps/platform/network-policies.yaml — [매니페스트형 leaf] git 디렉토리 적용
# default-deny + ns별 NetworkPolicy (매니페스트에 ns 명시)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: cicd
  labels: { category: platform }
spec:
  project: platform
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: release
    path: components/platform/network-policies
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
