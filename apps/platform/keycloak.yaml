# Keycloak (OIDC IdP) — Helm 차트 + git values 멀티소스 (redis.yaml 과 동일 패턴).
# ns·ExternalSecret·HTTPRoute 같은 raw 매니페스트는 이 App 이 아니라 각 카테고리에서 적용.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: cicd
  labels: { category: platform }
spec:
  project: platform
  sources:
    # ① 차트는 bitnami helm repo 에서
    - repoURL: https://charts.bitnami.com/bitnami
      chart: keycloak
      targetRevision: 25.2.0
      helm:
        releaseName: keycloak # 수동 helm install 과 릴리스명 일치 → ArgoCD 가 그대로 adopt(중복 방지)
        valueFiles:
          - $values/components/platform/keycloak/values.yaml # ②의 git 소스에서 values 참조
    # ② values 는 이 git repo 에서 (ref: values 로 ①의 $values 가 가리킴)
    - repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
      targetRevision: release
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak # ns 는 platform/namespaces 에서 PSA 라벨과 함께 미리 생성
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
