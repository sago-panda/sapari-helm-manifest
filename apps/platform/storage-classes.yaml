# apps/platform/storage-classes.yaml — [매니페스트형 leaf] git 디렉토리 적용
# Longhorn StorageClass (longhorn-prod / longhorn-single)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-classes
  namespace: cicd
  labels: { category: platform }
spec:
  project: platform
  source:
    repoURL: https://gitlab.com/sagopanda/sapari-helm-manifest.git
    targetRevision: main
    path: components/platform/storage-classes
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default # 매니페스트에 ns 가 있으면 그쪽으로
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ ServerSideApply=true ]
